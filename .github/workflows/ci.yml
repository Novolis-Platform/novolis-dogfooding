name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Build dogfood apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Novolis-Platform/novolis-workflows/actions/setup-dotnet@main
        with:
          dotnet-version: 10.0.x
      - name: Clone library repos
        shell: pwsh
        run: ./scripts/sync-submodules.ps1
      - run: dotnet restore Novolis.Dogfooding.slnx
        shell: bash
      - run: dotnet build Novolis.Dogfooding.slnx --no-restore -c Release
        shell: bash
