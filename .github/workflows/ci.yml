name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  ci:
    name: Build dogfood apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Novolis-Platform/novolis-workflows/actions/setup-dotnet@main
        with:
          dotnet-version: 10.0.x
      - uses: Novolis-Platform/novolis-workflows/actions/authenticate-github-packages@main
        with:
          token: ${{ github.token }}
      - run: dotnet restore Novolis.Dogfooding.slnx --configfile nuget.config
      - run: dotnet build Novolis.Dogfooding.slnx --no-restore -c Release
